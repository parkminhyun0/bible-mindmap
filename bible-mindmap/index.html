<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- index.html 캐시 방지 (모바일 사파리·크롬이 오래된 번들 해시 참조하는 문제 해결)
         번들 파일(index-*.js)은 해시가 붙어 있어 캐시 안전 · index.html 만 no-cache 로 유지 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>성경 마인드맵 · PARK MIN HYUN · Jarvis claude-sonnet 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      /* 렉시콘 팝업 정의 영역 */
      .lex-def { font-size: 12px; line-height: 1.75; color: #334155; }
      .lex-def p { margin: 0 0 7px; }
      .lex-def p:last-child { margin-bottom: 0; }
      .lex-def b, .lex-def strong { color: #1e293b; font-weight: 600; }
      .lex-def i, .lex-def em { color: #475569; font-style: italic; }
      .lex-def a { color: #3b82f6 !important; text-decoration: none; font-weight: 600; }
      .lex-def a:hover { text-decoration: underline; }
      .lex-def ul, .lex-def ol { margin: 4px 0; padding-left: 18px; }
      .lex-def li { margin-bottom: 3px; }
      .lex-etym { color: #64748b !important; font-size: 11px; }
      .lex-kjv  { color: #64748b !important; font-size: 11px; border-top: 1px solid #f1f5f9; padding-top: 6px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- 캐시된 이전 번들 자동 감지 · 강제 재로드 (모바일 white screen 방어)
         이전에 캐시된 index.html 이 이미 삭제된 index-*.js 를 참조하면 404
         이전 index.html 이 오래된 번들 참조 시 ReferenceError 발생 → 감지 후 재로드 -->
    <script>
      (function selfHealCache() {
        var reloaded = sessionStorage.getItem('__bm_cache_reload');
        // 1) 스크립트 로드 실패 감지 (404 등)
        window.addEventListener('error', function(e) {
          var isBundle = e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK');
          var isRefErr = e.error && /is not defined|Cannot read propert/.test(e.error.message || '');
          if ((isBundle || isRefErr) && !reloaded) {
            sessionStorage.setItem('__bm_cache_reload', '1');
            var url = new URL(location.href);
            url.searchParams.set('_v', Date.now());
            location.replace(url.toString());
          }
        }, true);
        // 2) 정상 로드 후에는 flag 리셋 (다음 세션 대비)
        window.addEventListener('load', function() {
          setTimeout(function() { sessionStorage.removeItem('__bm_cache_reload'); }, 3000);
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
