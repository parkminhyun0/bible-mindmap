<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#060c1a"/>
    </radialGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="55%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Aurora bands -->
  <ellipse cx="250" cy="200" rx="500" ry="80" fill="#10b981" opacity="0.12" filter="url(#blur1)" transform="rotate(-15 250 200)"/>
  <ellipse cx="950" cy="420" rx="450" ry="70" fill="#7c3aed" opacity="0.15" filter="url(#blur1)" transform="rotate(10 950 420)"/>
  <ellipse cx="600" cy="120" rx="600" ry="50" fill="#059669" opacity="0.10" filter="url(#blur1)"/>
  <ellipse cx="700" cy="500" rx="400" ry="60" fill="#6d28d9" opacity="0.12" filter="url(#blur1)" transform="rotate(-8 700 500)"/>

  <!-- Mindmap network dots (background) -->
  <g opacity="0.25">
    <circle cx="80" cy="80" r="4" fill="#10b981"/>
    <circle cx="160" cy="140" r="3" fill="#7c3aed"/>
    <circle cx="240" cy="90" r="5" fill="#10b981"/>
    <circle cx="320" cy="160" r="3" fill="#d97706"/>
    <circle cx="100" cy="200" r="4" fill="#7c3aed"/>
    <line x1="80" y1="80" x2="160" y2="140" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <line x1="160" y1="140" x2="240" y2="90" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <line x1="160" y1="140" x2="320" y2="160" stroke="#d97706" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="200" x2="160" y2="140" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

    <circle cx="1050" cy="100" r="4" fill="#10b981"/>
    <circle cx="1120" cy="170" r="3" fill="#7c3aed"/>
    <circle cx="980" cy="160" r="5" fill="#d97706"/>
    <circle cx="1100" cy="240" r="3" fill="#10b981"/>
    <line x1="1050" y1="100" x2="1120" y2="170" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <line x1="1120" y1="170" x2="980" y2="160" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <line x1="1120" y1="170" x2="1100" y2="240" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

    <circle cx="80" cy="520" r="4" fill="#7c3aed"/>
    <circle cx="150" cy="580" r="3" fill="#10b981"/>
    <circle cx="220" cy="540" r="4" fill="#d97706"/>
    <line x1="80" y1="520" x2="150" y2="580" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <line x1="150" y1="580" x2="220" y2="540" stroke="#10b981" stroke-width="1" opacity="0.5"/>

    <circle cx="1000" cy="500" r="4" fill="#10b981"/>
    <circle cx="1080" cy="560" r="3" fill="#7c3aed"/>
    <circle cx="1140" cy="510" r="4" fill="#d97706"/>
    <line x1="1000" y1="500" x2="1080" y2="560" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <line x1="1080" y1="560" x2="1140" y2="510" stroke="#d97706" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Book icon (center, glowing) -->
  <g transform="translate(600, 185)" filter="url(#blur2)">
    <!-- Glow behind book -->
    <circle cx="0" cy="0" r="70" fill="#10b981" opacity="0.15"/>
    <!-- Book shape -->
    <rect x="-48" y="-38" width="46" height="62" rx="5" fill="#1e3a5f" stroke="#10b981" stroke-width="1.5"/>
    <rect x="2" y="-38" width="46" height="62" rx="5" fill="#1e3a5f" stroke="#10b981" stroke-width="1.5"/>
    <!-- Spine lines -->
    <line x1="-48" y1="-30" x2="-2" y2="-30" stroke="#10b981" stroke-width="1" opacity="0.6"/>
    <line x1="-48" y1="-20" x2="-2" y2="-20" stroke="#10b981" stroke-width="1" opacity="0.4"/>
    <line x1="-48" y1="-10" x2="-2" y2="-10" stroke="#10b981" stroke-width="1" opacity="0.4"/>
    <line x1="-48" y1="0" x2="-2" y2="0" stroke="#10b981" stroke-width="1" opacity="0.4"/>
    <line x1="2" y1="-30" x2="48" y2="-30" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <line x1="2" y1="-20" x2="48" y2="-20" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
    <line x1="2" y1="-10" x2="48" y2="-10" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
    <line x1="2" y1="0" x2="48" y2="0" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
    <!-- Center spine -->
    <rect x="-3" y="-40" width="6" height="66" rx="3" fill="#10b981" opacity="0.8"/>
  </g>

  <!-- Main title -->
  <text x="600" y="310" text-anchor="middle" font-family="'Noto Serif KR', 'Apple SD Gothic Neo', serif"
        font-size="64" font-weight="700" fill="white" opacity="0.95" filter="url(#textglow)">
    성경 마인드맵
  </text>

  <!-- English subtitle -->
  <text x="600" y="362" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="400" fill="#94a3b8" letter-spacing="3">
    Bible Mindmap
  </text>

  <!-- Divider -->
  <line x1="440" y1="390" x2="760" y2="390" stroke="#10b981" stroke-width="1" opacity="0.4"/>

  <!-- Tagline -->
  <text x="600" y="425" text-anchor="middle" font-family="'Noto Sans KR', sans-serif"
        font-size="18" fill="#64748b" letter-spacing="1">
    원문 성경 마인드맵 · Interactive Bible Study
  </text>

  <!-- Feature chips -->
  <g transform="translate(600, 475)">
    <!-- Chip 1 -->
    <rect x="-290" y="-15" width="100" height="30" rx="15" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
    <text x="-240" y="5" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#10b981">🔤 원문 렉시콘</text>
    <!-- Chip 2 -->
    <rect x="-175" y="-15" width="90" height="30" rx="15" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4"/>
    <text x="-130" y="5" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a78bfa">👤 인물 연결</text>
    <!-- Chip 3 -->
    <rect x="-70" y="-15" width="90" height="30" rx="15" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1" stroke-opacity="0.4"/>
    <text x="-25" y="5" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fbbf24">📍 장소 지도</text>
    <!-- Chip 4 -->
    <rect x="35" y="-15" width="100" height="30" rx="15" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1" stroke-opacity="0.4"/>
    <text x="85" y="5" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#10b981">🕰️ 시대 연표</text>
    <!-- Chip 5 -->
    <rect x="150" y="-15" width="90" height="30" rx="15" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4"/>
    <text x="195" y="5" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a78bfa">🔗 교차 참조</text>
  </g>

  <!-- Bottom credit -->
  <text x="600" y="590" text-anchor="middle" font-family="sans-serif"
        font-size="13" fill="#334155" letter-spacing="1">
    PARK MIN HYUN · Built with Jarvis (claude-sonnet · 2026)
  </text>
</svg>
