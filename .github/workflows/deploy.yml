name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bible-mindmap
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bible-mindmap/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build lexicon data (STEPBible TAGNT + TAHOT)
        run: node scripts/build-lexicon.mjs

      - name: Build app
        run: npm run build

      - name: Copy landing pages to dist root
        run: |
          cp -r landing/. dist/
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: bible-mindmap/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
